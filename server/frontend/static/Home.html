<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Review - Dealerships</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/bootstrap.min.css">
</head>
<body style="background-color: #f8f9fa;">
    <nav class="navbar navbar-dark bg-info shadow-sm">
        <div class="container-fluid"><a class="navbar-brand" href="/">Dealerships</a></div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4">Post a Review for Holdlamis Car Dealership</h2>
                
                <div class="card p-4 shadow-sm border-0">
                    <form>
                        <div class="mb-3">
                            <label class="form-label"><strong>Enter the review content:</strong></label>
                            <textarea class="form-control" rows="3" placeholder="Write your review here...">This was a fantastic experience! The staff was very helpful and the car selection was great. Highly recommend this dealer.</textarea>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="purchaseCheck" checked>
                            <label class="form-check-label" for="purchaseCheck">Has purchased a car from this dealer?</label>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><strong>Select Car (Make-Model-Year):</strong></label>
                            <select class="form-select">
                                <option selected>Toyota-Camry-2022</option>
                                <option>Honda-Civic-2023</option>
                                <option>Ford-F150-2021</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><strong>Select Date:</strong></label>
                            <input type="date" class="form-control" value="2026-04-05">
                        </div>

                        <div class="mt-4">
                            <button type="button" class="btn btn-primary px-4">Post Review</button>
                            <a href="#" class="btn btn-outline-secondary ms-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
